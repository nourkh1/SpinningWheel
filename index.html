<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spinning Wheel</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1 class="title">🎡 Spinning Wheel 🎡</h1>

  <div class="main">
    <div class="wheel-section">
      <canvas id="wheel"></canvas>
      <div class="pointer"></div>
    </div>

    <div class="controls">
      <label for="entries">Enter options (one per line):</label>
      <textarea id="entries" placeholder="Option 1&#10;Option 2&#10;Option 3"></textarea>

      <div class="buttons">
        <button class="generate" onclick="generateWheel()">Generate Wheel</button>
        <button class="spin" onclick="spin()">Spin</button>
        <button onclick="shuffleEntries()">Shuffle</button>
        <button onclick="resetWheel()">Reset</button>
      </div>
    </div>
  </div>

  <div id="result"></div>

  <script src="script.js"></script>
</body>
</html>
