<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Spinning Wheel</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./style.css">
</head>
<body>
<h1 class="title">🎡 Spinning Wheel 🎡</h1>

<div class="wheel-section">
  <canvas id="wheel"></canvas>
  <div class="pointer"></div>
</div>

<div class="buttons">
  <button class="spin" onclick="spin()">Spin</button>
  <button onclick="window.location.href='index.html'">Edit Options</button>
</div>

<div id="result"></div>

<script src="./script.js"></script>
<script>
window.onload = function() {
  const saved = localStorage.getItem('toysWheel');
  if(saved){
    entries = JSON.parse(saved);
    drawWheel();
  } else {
    alert("No options found! Redirecting to options page.");
    window.location.href = 'index.html';
  }
}
</script>
</body>
</html>
